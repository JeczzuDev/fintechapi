spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fintechdb
    username: fintechuser
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
