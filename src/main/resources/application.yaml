spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fintechdb
    username: fintechuser
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080
  error:
    include-stacktrace: never
